[package]
name = "gaia-processing"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "gaia-processing"
path = "src/main.rs"

[dependencies]
gaia-common = { path = "../common" }

anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
toml.workspace = true
ctrlc.workspace = true

# Inference
tract-tflite.workspace = true
tract-onnx.workspace = true

# Storage
rusqlite.workspace = true

# Spectrogram
rustfft.workspace = true
image.workspace = true
hound.workspace = true

# HTTP client
reqwest.workspace = true

# Archive & checksum (Zenodo model download)
zip.workspace = true
md5.workspace = true

# GPU-accelerated inference via ONNX Runtime (MIGraphX EP for ROCm).
# Enabled at build time with `--features rocm`.  When disabled,
# inference uses the default tract-onnx CPU backend.
[dependencies.ort]
version = "2.0.0-rc.12"
optional = true
features = ["load-dynamic"]

[features]
default = []
rocm = ["ort"]
