# Model manifest for BatDetect2
#
# Place this file as manifest.toml inside a model directory, e.g.:
#   /models/batdetect2/manifest.toml
#
# BatDetect2 is a deep-learning bat echolocation call detector and
# species classifier developed by the Biodiversity Research team at
# the Alan Turing Institute.
#
# Source: https://github.com/macaodha/batdetect2
#
# The PyTorch weights are automatically exported to ONNX at container
# build time and baked into the image.  At first start the entrypoint
# seeds labels.csv into the model volume, and ensure_onnx_file()
# copies the ONNX model from the baked-in path.

[model]
name = "BatDetect2"
slug = "batdetect2"
domain = "bats"
# Bat echolocation is ultrasonic — BatDetect2 expects 256 kHz audio.
sample_rate = 256000
chunk_duration = 1.0
tflite_file = "batdetect2.tflite"
onnx_file = "batdetect2.onnx"
labels_file = "labels.csv"
v1_metadata = false
# BatDetect2 outputs raw logits — softmax converts them to probabilities
apply_softmax = true
# BatDetect2 is a detection model that expects a spectrogram input,
# not a classifier that accepts raw audio.
onnx_is_classifier = false
# BatDetect2 exports Resize with `coordinate_transformation_mode =
# pytorch_half_pixel`, which tract-onnx cannot load reliably.
# Prefer ONNX Runtime directly.
prefer_ort = true

# No metadata model for bats
# [metadata_model]
