# Example model manifest for Google Perch 2.0
#
# Place this file as manifest.toml inside a model directory, e.g.:
#   /models/perch/manifest.toml
#
# The processing server auto-discovers all subdirectories of MODEL_DIR
# that contain a manifest.toml.
#
# If model files are missing and a [download] section is present, the
# server will automatically download them from HuggingFace.

[model]
name = "Google Perch 2.0"
slug = "perch"
domain = "wildlife"
sample_rate = 32000
chunk_duration = 5.0
# Perch is ONNX-only — no TFLite file needed for inference.
# Set to a placeholder; the ONNX path takes priority when present.
tflite_file = "model.tflite"
# Standard model with native DFT op.  prefer_ort=true routes
# inference through ONNX Runtime which handles DFT natively.
# (The no_dft variant hangs ORT during graph optimisation because
# its DFT-to-MatMul replacement creates huge weight matrices.)
onnx_file = "model.onnx"
labels_file = "labels.csv"
# Perch does not use V1-style metadata input
v1_metadata = false
# Perch outputs raw logits (from nn.Dense, no activation).
# BirdNET-Analyzer applies softmax to these logits:
#   tf.nn.softmax(result["label"], axis=-1)
# Even with ~15K classes, softmax produces meaningful scores because
# confident detections concentrate probability mass on a few species.
# DO NOT use sigmoid: all logits cluster at similar values so sigmoid
# saturates them all near 100%.
# DO NOT use "none": raw logits > 1.0 get clamped to 1.0 (100%).
apply_softmax = false
score_transform = "softmax"
# Perch's ONNX model accepts raw audio [1, N] at 32 kHz, NOT mel
# spectrograms.  The model does internal STFT/mel computation.
# Only BirdNET V2.4's extracted classifier sub-model needs this
# set to true.
onnx_is_classifier = false
# Perch V2 has 4 ONNX outputs:
#   [0] = embedding (1536-dim)
#   [1] = spatial_embedding (16×4×1536)
#   [2] = spectrogram (500×128)
#   [3] = label predictions (14795)
prediction_output_index = 3
# Force ONNX Runtime — tract cannot handle Perch's native DFT op,
# and the no-DFT (MatMul) variant produces incorrect output in
# tract while hanging ORT's graph optimiser.  ORT handles the
# standard model's native DFT correctly and efficiently.
prefer_ort = true
# Experimental — less proven than BirdNET V2.4 for bird-specific
# identification.  Displayed with a "BETA" badge in the UI.
beta = true
# Lower trust weight for agreement scoring (BirdNET V2.4 = 1.0).
trust_weight = 0.5

# ── Automatic download from HuggingFace ──────────────────────────────
#
# The processing server downloads individual files on first start.
# No Zenodo record or variant system — Perch has a single ONNX model.
#
# Source: https://huggingface.co/justinchuby/Perch-onnx  (ONNX model, public)
#         https://huggingface.co/cgeorgiaw/Perch          (labels, public)
#
# The Google repo (google/bird-vocalization-classifier) is gated and
# requires authentication.  These community mirrors are Apache-2.0
# licensed and publicly accessible without login.
#
# Species coverage: ~15,000 species including birds, frogs, crickets,
# grasshoppers, and mammals.
#
# NOTE: we download the standard model (perch_v2.onnx) which has a
# native DFT op.  With prefer_ort=true, ONNX Runtime handles it
# correctly.  The no_dft variant (MatMul-replaced DFT) causes ORT
# to hang during graph optimisation and is no longer used.

[download]
# No Zenodo variants — files are downloaded directly from HuggingFace.
default_variant = "default"

[download.direct_files]
"model.onnx" = "https://huggingface.co/justinchuby/Perch-onnx/resolve/main/perch_v2.onnx"
"labels.csv" = "https://huggingface.co/cgeorgiaw/Perch/resolve/main/assets/labels.csv"
